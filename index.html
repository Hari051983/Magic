<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenditure Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Expenditure Management Application</h1>
    <form id="expenseForm">
        <input type="text" id="description" placeholder="Description" required>
        <input type="number" id="amount" placeholder="Amount" required>
        <button type="submit">Add Expense</button>
    </form>
    <table id="expenseTable">
        <thead>
            <tr>
                <th>Description</th>
                <th>Amount</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <script>
        const form = document.getElementById('expenseForm');
        const tableBody = document.getElementById('expenseTable').getElementsByTagName('tbody')[0];

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const description = document.getElementById('description').value;
            const amount = document.getElementById('amount').value;

            if(description && amount) {
                addExpense(description, amount);
            }
            form.reset();
        });

        function addExpense(description, amount) {
            const row = tableBody.insertRow();
            const cell1 = row.insertCell(0);
            const cell2 = row.insertCell(1);
            const cell3 = row.insertCell(2);
            cell1.textContent = description;
            cell2.textContent = amount;
            cell3.innerHTML = '<button onclick="deleteExpense(this)">Delete</button>';
        }

        function deleteExpense(button) {
            const row = button.parentNode.parentNode;
            tableBody.deleteRow(row.rowIndex - 1);
        }
    </script>
</body>
</html>
